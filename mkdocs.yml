site_name: Agentomatic
site_description: Drop agents, not code — Zero-code multi-agent API platform framework
site_author: UnicoLab
site_url: https://unicolab.github.io/agentomatic
repo_url: https://github.com/UnicoLab/agentomatic
repo_name: UnicoLab/agentomatic
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 UnicoLab

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - announce.dismiss
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - abbr
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/UnicoLab/agentomatic
      name: Agentomatic on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentomatic/
      name: Agentomatic on PyPI
  generator: false

