events {
    worker_connections 1024;
}

http {
    upstream alpha-agent {
        server alpha-agent:8000;
    }

    upstream beta-agent {
        server beta-agent:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Route to Alpha Agent
        location /alpha/ {
            rewrite ^/alpha/(.*)$ /$1 break;
            proxy_pass http://alpha-agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route to Beta Agent
        location /beta/ {
            rewrite ^/beta/(.*)$ /$1 break;
            proxy_pass http://beta-agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Default route to Alpha Agent
        location / {
            proxy_pass http://alpha-agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}