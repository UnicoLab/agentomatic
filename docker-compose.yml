version: '3.8'

services:
  # Alpha Agent
  alpha-agent:
    build: .
    container_name: alpha-agent
    ports:
      - "8001:8000"
    environment:
      - AGENT_NAME=alpha
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - .:/app
    networks:
      - vision-network

  # Beta Agent
  beta-agent:
    build: .
    container_name: beta-agent
    ports:
      - "8002:8000"
    environment:
      - AGENT_NAME=beta
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: ["uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - .:/app
    networks:
      - vision-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vision-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - alpha-agent
      - beta-agent
    networks:
      - vision-network

networks:
  vision-network:
    driver: bridge