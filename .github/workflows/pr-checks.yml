name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-quality:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check PR title (conventional commits)
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          REGEXP="^(break|build|ci|docs|feat|fix|perf|refactor|style|test|chore|ops|hotfix)(\([a-zA-Z0-9\-\_\/\:]+\))?(!)?:\s.+"
          if [[ ! "$TITLE" =~ $REGEXP ]]; then
            echo "Error: PR title '$TITLE' does not follow Conventional Commits format!"
            exit 1
          fi
        shell: bash

      - name: Get changed files
        id: files
        run: |
          git fetch origin main --depth=1
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | tr '\n' ' ')
          echo "all=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit on changed files
        run: |
          echo "Changed files: ${{ steps.files.outputs.all }}"
          if [ -n "${{ steps.files.outputs.all }}" ]; then
            pre-commit run -v --files ${{ steps.files.outputs.all }}
          else
            echo "No changed files to check."
          fi
        shell: bash
