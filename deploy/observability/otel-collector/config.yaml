# OpenTelemetry Collector config for Agentomatic traces.
#
# Receives OTLP (gRPC :4317 / HTTP :4318) from the Agentomatic app and
# exposes collector self-metrics on :8888 for Prometheus. Traces are logged
# via the debug exporter by default; wire in your tracing backend (Tempo,
# Jaeger, Honeycomb, etc.) under `exporters` and add it to the pipeline.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  debug:
    verbosity: normal
  # Example Tempo/OTLP backend (uncomment + configure):
  # otlp/tempo:
  #   endpoint: tempo:4317
  #   tls:
  #     insecure: true

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
