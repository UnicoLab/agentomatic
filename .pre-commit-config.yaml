repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
        exclude: \.vscode/
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/agentomatic/ --ignore-missing-imports
        language: system
        pass_filenames: false
        files: ^src/agentomatic/

  # Strip ANSI / bat line numbers before conventional-commit validation.
  # Needed when `cat` is aliased to `bat` and HEREDOC commit messages get colored.
  - repo: local
    hooks:
      - id: strip-commit-msg-ansi
        name: strip ANSI from commit message
        entry: python3 scripts/strip_commit_msg_ansi.py
        language: system
        stages: [commit-msg]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, test, ci, refactor, perf, style, build]
