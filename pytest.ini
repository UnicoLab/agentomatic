[tool:pytest]
minversion = 7.0
addopts =
    -ra
    -q
    --strict-markers
    --strict-config
    --tb=short
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70
    -n auto
    --dist=worksteal
    --maxfail=10

testpaths = tests
asyncio_mode = auto
timeout = 300

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    parallel: marks tests to run in parallel
    load: marks tests for load testing
    stress: marks tests for stress testing
    performance: marks tests for performance benchmarking
    docker: marks tests that require Docker
    e2e: marks tests as end-to-end tests
    api: marks tests for API endpoints
    agent: marks tests for agent functionality

python_files = test_*.py *_test.py
python_classes = Test* *Test
python_functions = test_* *_test

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:httpx.*
    ignore::pytest.PytestUnraisableExceptionWarning

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

junit_family = xunit2